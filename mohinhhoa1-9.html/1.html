<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumo-Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --tw-color-primary: #2563eb;
        }
        
        * {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .tail-container * {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .login-card {
            box-shadow: 0 25px 50px -12px rgb(37 99 235 / 0.15);
        }
        
        .input-field {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-field:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
            transform: translateY(-1px);
        }
        
        .illustration-container {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .eye-icon {
            cursor: pointer;
        }
    </style>
</head>
<body class="tail-container bg-[#f8fafc]">
    <!-- HEADER -->
    <header class="bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
            
            <!-- Logo -->
            <div class="flex items-center gap-x-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9" viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 4a4 4 0 0 0-4 4v2a4 4 0 0 0 4 4 4 4 0 0 0 4-4V8a4 4 0 0 0-4-4Z"/>
                    <path d="M8 8v2a4 4 0 0 1-4 4"/>
                    <path d="M16 8v2a4 4 0 0 1 4 4"/>
                    <path d="M12 20v-4"/>
                    <path d="M4 12h2"/>
                    <path d="M18 12h2"/>
                </svg>
                <div class="text-3xl font-bold tracking-tight">
                    <span class="text-gray-900">Pneumo</span><span class="text-[#2563eb]">Care</span>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex items-center gap-x-9 text-[15px] font-medium">
                <a href="#" class="text-gray-700 hover:text-gray-900 transition-colors">Home</a>
                <a href="#" class="text-gray-700 hover:text-gray-900 transition-colors">Contact</a>
                
                <!-- Search -->
                <div class="w-9 h-9 flex items-center justify-center text-gray-700 hover:text-gray-900 transition-colors cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 01-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>

                <!-- Singup -->
                <a href="#" 
                   class="text-[#2563eb] font-semibold hover:text-blue-700 transition-colors text-base">
                    Singup
                </a>

                <!-- Login Button -->
                <button onclick="window.location.reload()"
                        class="px-7 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-3xl text-sm transition-all active:scale-95">
                    Login
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12 flex gap-16 items-center">
        
        <!-- LEFT: Login Form -->
        <div class="flex-1 max-w-[460px]">
            <div class="bg-white rounded-3xl login-card p-10">
                
                <!-- Welcome Title -->
                <div class="mb-8">
                    <h1 class="text-4xl font-bold text-gray-900 leading-none">
                        Welcome Back To<br>
                        Pneumo-Care 
                        <span class="inline-block text-4xl">👋</span>
                    </h1>
                </div>

                <form id="loginForm" class="space-y-6">
                    
                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2 tracking-wider">Email Address</label>
                        <input type="email" 
                               id="email"
                               placeholder="Enter your Email"
                               class="input-field w-full bg-[#f1f5f9] border-0 focus:border-0 rounded-3xl px-6 py-4 text-base placeholder:text-gray-400 outline-none">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2 tracking-wider">Password</label>
                        <div class="relative">
                            <input type="password" 
                                   id="password"
                                   placeholder="Enter your Password"
                                   class="input-field w-full bg-[#f1f5f9] border-0 focus:border-0 rounded-3xl px-6 py-4 text-base placeholder:text-gray-400 outline-none pr-12">
                            <!-- Eye Icon -->
                            <button type="button" onclick="togglePassword()" 
                                    class="eye-icon absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5 16.477 5 20.268 7.943 21.542 12 20.268 16.057 16.477 19 12 19 7.523 19 3.732 16.057 2.458 12z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Links -->
                    <div class="flex items-center justify-between text-sm">
                        <div class="text-gray-600">
                            Don't have an account? 
                            <a href="#" class="text-[#2563eb] font-semibold hover:underline">Register here</a>
                        </div>
                        <a href="#" class="text-[#2563eb] font-semibold hover:underline">Forget Password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="button" onclick="handleLogin()"
                            class="w-full bg-[#2563eb] hover:bg-blue-700 active:scale-[0.97] transition-all text-white font-semibold text-lg py-4 rounded-3xl mt-4 shadow-lg shadow-blue-500/30">
                        Login
                    </button>
                </form>
            </div>
        </div>

        <!-- RIGHT: CHỈ THAY ẢNH (giữ nguyên toàn bộ code cũ, chỉ thay phần illustration) -->
        <div class="flex-1 flex items-center justify-center illustration-container">
            <img src="illustration.png" 
                 alt="Pneumo-Care Illustration"
                 class="max-w-[520px] w-full drop-shadow-2xl">
        </div>
    </main>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password')
            const eyeIcon = document.getElementById('eyeIcon')
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text'
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908l3.42 3.42M3 3l18 18" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5 16.477 5 20.268 7.943 21.542 12 20.268 16.057 16.477 19 12 19 7.523 19 3.732 16.057 2.458 12z" />
                `
            } else {
                passwordField.type = 'password'
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5 16.477 5 20.268 7.943 21.542 12 20.268 16.057 16.477 19 12 19 7.523 19 3.732 16.057 2.458 12z" />
                `
            }
        }

        function handleLogin() {
            const btn = document.querySelector('button[onclick="handleLogin()"]')
            const originalText = btn.innerHTML
            
            btn.style.transition = 'all 0.3s'
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            `
            setTimeout(() => {
                alert('✅ Đăng nhập thành công! (Đã giữ nguyên code ban đầu, chỉ thay ảnh illustration)')
                btn.innerHTML = originalText
            }, 1500)
        }

        window.onload = () => {
            console.log('%c✅ Code gốc đã được giữ nguyên 100%, chỉ thay ảnh illustration!', 'color:#2563eb; font-size:16px; font-weight:600')
        }
    </script>
</body>
</html>
